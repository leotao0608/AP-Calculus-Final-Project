<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Calculus Maze</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/png" href="pi_image.png">
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
  <!-- Firebase CDN -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div id="screen-auth" class="screen">
    <div class="auth-card">
      <h1 class="logo">∫ CALCULUS MAZE</h1>
      <div class="tab-row">
        <button class="tab-btn active" onclick="switchTab('login')">Login</button>
        <button class="tab-btn"        onclick="switchTab('register')">Register</button>
      </div>

      <div id="tab-login" class="tab-panel active">
        <input type="email"    id="login-email"    placeholder="Email" />
        <input type="password" id="login-password" placeholder="Password" />
        <button class="btn-primary" onclick="login()">ENTER</button>
      </div>

      <div id="tab-register" class="tab-panel">
        <input type="text"     id="reg-username" placeholder="Username" />
        <input type="email"    id="reg-email"    placeholder="Email" />
        <input type="password" id="reg-password" placeholder="Password" />
        <button class="btn-primary" onclick="register()">CREATE ACCOUNT</button>
      </div>

      <p id="auth-error" class="error-msg"></p>
    </div>
  </div>

  <!-- ── main menu ────────────────────────────────────── -->
    <div id="screen-menu" class="screen">
        <div class="auth-card">
            <h1 class="logo">∫ CALCULUS MAZE</h1>
            <p id="menu-welcome"></p>
            <div id="menu-nav"></div>
        </div>
    </div>
    <div id="screen-levelselect" class="screen">
        <div class="auth-card">
            <h1 class="logo">SELECT LEVEL</h1>
            <div id="level-list"></div>
            <button class="btn-primary" onclick="showScreen('screen-menu')">BACK</button>
        </div>
    </div>
    <!-- ── game ──────────────────────────────────────── -->
    <div id="screen-game" class="screen">
        <!-- HUD -->
        <div id="hud">
            <span id="hud-hp">Chances: 3</span>
            <span id="hud-score">SCORE: 0</span>
            <span id="hud-topic">—</span>
        </div>
        <canvas id="maze-canvas"></canvas>
        <!-- questions -->
        <div id="question-card">
            <p id="q-meta"></p>
            <div id="q-text"></div>
            <div id="q-options"></div>
            <p id="q-feedback"></p>
            <div id="q-cheat-row">
              <div id="cheat-left"  onclick="cheatClick('left')"></div>
              <button id="btn-next" class="btn-primary" onclick="nextQuestion()" style="display:none">NEXT QUESTION -></button>
              <div id="cheat-right" onclick="cheatClick('right')"></div>
            </div>
        </div>
        <!--Alert-->
        <div id="alert-card">
          <p>You encountered a question!</p>
        </div>
        <div id="game-footer">
            <button class="btn-primary" style="width:auto" onclick="fromContinue ? showScreen('screen-menu') : showLevelSelect()">BACK</button>            
            <button class="btn-primary" style="width:auto" onclick="saveProgress()">SAVE</button>
            <span id="save-status"></span>
        </div>
    </div>
    <!--review-->
    <div id="screen-review" class="screen">
      <div id="review-container">
        <div class="review-column">
          <h2>WEAK TOPICS</h2>
          <div id="review-left">
            <div id="review-summary"></div>
            <canvas id="topic-chart" style="margin-top:1rem"></canvas>
          </div>
        </div>
        <div class="review-column">
          <h2>MISTAKES</h2>

          <div id="review-right">
            <div id="review-list"></div>
          </div>
        </div>
      </div>
      
      <button class="btn-primary" onclick="showScreen('screen-menu')" id="review-back">BACK</button>
    </div>
    <div id="screen-leaderboard" class="screen">
      <div class="auth-card" style="width:480px">
        <h1 class="logo">LEADERBOARD</h1>
        <div id="leaderboard-list"></div>
        <button class="btn-primary" onclick="showScreen('screen-menu')">BACK</button>
      </div>
    </div>
    <div id="confirm-card" class="alert-card">
      <p id="confirm-message">Are you sure?</p>
      <div style="display:flex;gap:1rem;justify-content:center;margin-top:1rem">
        <button class="btn-primary" id="confirm-yes">YES</button>
        <button class="btn-primary" id="confirm-no">NO</button>
      </div>
    </div>
    <div id="pass-card">
      <p>🎉 You passed!</p>
    </div>
  <!-- Scripts -->
    <script src="firebase.js"></script>
    <script src="auth.js"></script>
    <script src="maze.js"></script>
    <script src="save.js"></script>
    <script src="review.js"></script>
    <script src="leaderboard.js"></script>
    <script src="game.js"></script>
    <script src="mathSignature.js"></script>

    
  <script>
    function switchTab(tab) {
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      event.target.classList.add('active');
    }
  </script>
  
  <div id="site-footer">
    <span>Developed by: <button class="name-btn" onclick="showSignature('xichen')">Xichen Tao</button> · <button class="name-btn" onclick="showSignature('allen')">Allen Feng</button></span>
  </div>

  <div id="signature-card">
    <img id="signature-img" src="" alt="Math Signature" />
    <button class="btn-primary" style="margin-top:1rem;width:auto;padding:0.4rem 1.5rem" onclick="document.getElementById('signature-card').classList.remove('open')">CLOSE</button>
  </div>
</body>
</html>
